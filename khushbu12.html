<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowBeauty Cosmetics</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>

<style>

        body {
            background-color: #f8f9fa;
        }
        .card img {
            height: 250px;
            object-fit: cover;
        }
    </style>

</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">GlowBeauty</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navBar">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navBar">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Order</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<div id="carouselExample" class="carousel slide mt-3" data-bs-ride="carousel">
  <div class="carousel-inner">

    <div class="carousel-item active">
      <img src="https://img.freepik.com/premium-photo/collection-cosmetic-skin-care-products_1167055-843.jpg" class="d-block w-50">
    </div>

    <div class="carousel-item">
      <img src="https://png.pngtree.com/background/20230427/original/pngtree-beauty-cosmetic-products-on-dark-background-picture-image_2496070.jpg" class="d-block w-50">
    </div>

    <div class="carousel-item">
      <img src="https://png.pngtree.com/background/20230414/original/pngtree-makeup-skin-care-products-cosmetics-beauty-photography-advertising-background-picture-image_2424108.jpg" class="d-block w-50">
    </div>

  </div>

<button class="carousel-control-prev" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>

<div class="container mt-5">
    <h2 class="text-center mb-4">Our Cosmetics</h2>

    <div class="row">

        <div class="col-md-4">
            <div class="card">
                <img src="https://gl-images.condecdn.net/image/e6AO8OY6Zex/crop/1440/0.5235602094240838/f/untitled-1_sf.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Lipstick</h5>
                    <p>Matte finish lipstick.</p>

                    
                    <button class="btn btn-primary">Add to Cart</button>
                    <button class="btn btn-outline-secondary mt-2">View</button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <img src="https://down-id.img.susercontent.com/file/id-11134207-7qul3-lgzwvynz666y85" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Foundation</h5>
                    <p>Smooth skin finish.</p>

                    <button class="btn btn-success">Buy Now</button>
                    <button class="btn btn-outline-warning mt-2">Wishlist</button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <img src="https://media.glamourmagazine.co.uk/photos/639362467b473e3dc755fb1e/16:9/w_2580,c_limit/BEST%20PERFUME%20FOR%20WOMEN%2091222_SF.jpg?mbid=social_retweet" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Perfume</h5>
                    <p>Long-lasting fragrance.</p>

                    <button class="btn btn-danger">Add</button>
                    <button class="btn btn-outline-info mt-2">Preview</button>
                </div>
            </div>
        </div>

    </div>
</div>

<div class="container mt-5 mb-5">
    <h2 class="text-center mb-4">Place Your Order</h2>

    <form class="row g-3">

        <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control">
        </div>

        <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control">
        </div>

        <div class="col-12">
            <label class="form-label">Address</label>
            <input type="text" class="form-control">
        </div>

        <div class="col-md-6">
            <label class="form-label">Product</label>
            <select class="form-select">
                <option>Lipstick</option>
                <option>Foundation</option>
                <option>Perfume</option>
            </select>
        </div>

        <div class="col-md-6">
            <label class="form-label">Quantity</label>
            <input type="number" class="form-control">
        </div>

        <div class="col-12 text-center">
            <button class="btn btn-dark">Order Now</button>
            <button type="reset" class="btn btn-secondary">Reset</button>
            <button type="button" class="btn btn-outline-success">Save</button>
        </div>

    </form>
</div>

<footer class="bg-dark text-white text-center p-3">
 GlowBeauty Cosmetics
</footer>


</body>
</html>
