<html>
<head>
        <title>Practical 10 - HTML Iframes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 20px;
            background-color: #f4f4f4;
        }
        h1, h2 {
            color: #333;
            text-align: center;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        iframe {
            border: 2px solid #555;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

 <h1>Practical No. 10</h1>
<h3>Name: Khushbu Hood</h2>
<h3>USN: CS25148</h2>

    <hr>

    <div class="container">
        
        <section>
            <h2>1. Embedded Google Map</h2>
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3151.835434509374!2d144.9537353153166!3d-37.81627977975124!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad65d4c2b349649%3A0xb6899234e561db11!2sEnvato!5e0!3m2!1sen!2sau!4v1631530000000!5m2!1sen!2sau" 
                width="600" 
                height="450" 
                style="border:0;" 
                allowfullscreen="" 
                loading="lazy">
            </iframe>
        </section>

        <section>
            <h2>2. Embedded External Page</h2>
            <iframe 
                src="https://en.wikipedia.org/wiki/Main_Page" 
                width="800" 
                height="500" 
                title="External Page Demo">
            </iframe>
        </section>

    </div>

</body>
</html>
