<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practical 11</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(to right, #eef2f3, #ffffff);
    margin: 0;
    padding: 20px;
}

h1{
    color: #222;
    margin-bottom: 5px;
}

p{
    color: #555;
}

/* Section Card */
.section{
    background: #ffffff;
    padding: 25px;
    margin: 20px auto;
    width: 80%;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.section:hover{
    transform: scale(1.02);
}

/* Drag Box */
#dragBox{
    width: 120px;
    padding: 15px;
    background: #ff9800;
    color: white;
    margin: auto;
    cursor: grab;
    border-radius: 8px;
}

#dragBox:hover{
    background: #e68900;
}

/* Drop Area */
#dropArea{
    width: 250px;
    height: 120px;
    border: 2px dashed #555;
    margin: 20px auto;
    line-height: 120px;
    font-weight: bold;
    background: #fafafa;
    border-radius: 8px;
}

/* Buttons */
button{
    padding: 10px 15px;
    margin: 10px;
    cursor: pointer;
    border: none;
    background: #4CAF50;
    color: white;
    border-radius: 6px;
    transition: 0.3s;
}

button:hover{
    background: #2e7d32;
}

/* Input */
input{
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    width: 200px;
}
</style>
</head>

<body>

<h1>HTML5 APIs Demo</h1>
<p>Khushbu Hood</p>
<p>USN: CS25148</p>

<!-- Drag and Drop -->
<div class="section">
<h2>1. Drag and Drop</h2>

<div id="dragBox" draggable="true" ondragstart="drag(event)">
Drag Me
</div>

<div id="dropArea" ondrop="drop(event)" ondragover="allowDrop(event)">
Drop Here
</div>
</div>

<!-- Geolocation -->
<div class="section">
<h2>2. Geolocation</h2>

<button onclick="getLocation()">Get Location</button>
<p id="location"></p>
</div>

<!-- Web Storage -->
<div class="section">
<h2>3. Web Storage</h2>

<input type="text" id="name" placeholder="Enter Name">
<br>
<button onclick="saveData()">Save</button>
<button onclick="showData()">Show</button>
<button onclick="clearData()">Clear</button>

<p id="result"></p>
</div>

<script>

/* Drag and Drop */
function allowDrop(event){
    event.preventDefault();
}

function drag(event){
    event.dataTransfer.setData("text", event.target.id);
}

function drop(event){
    event.preventDefault();
    let data = event.dataTransfer.getData("text");
    let draggedElement = document.getElementById(data);

    if(event.target.id === "dropArea"){
        event.target.appendChild(draggedElement);
    }
}

/* Geolocation */
function getLocation(){
    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(showPosition);
    }
    else{
        document.getElementById("location").innerHTML="Geolocation not supported";
    }
}

function showPosition(position){
    document.getElementById("location").innerHTML =
    "📍 Latitude: " + position.coords.latitude +
    "<br>📍 Longitude: " + position.coords.longitude;
}

/* Web Storage */
function saveData(){
    let userName = document.getElementById("name").value;
    localStorage.setItem("username", userName);
    alert("Data Saved");
}

function showData(){
    let data = localStorage.getItem("username");

    if(data){
        document.getElementById("result").innerHTML = "Saved Name: " + data;
    } else {
        document.getElementById("result").innerHTML = "No data found!";
    }
}

function clearData(){
    localStorage.removeItem("username");
    document.getElementById("result").innerHTML = "Data Cleared!";
}

</script>

</body>
</html>
